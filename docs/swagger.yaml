basePath: /
definitions:
  dto.LoginRequest:
    properties:
      password:
        type: string
      phone_number:
        type: string
    required:
    - password
    - phone_number
    type: object
  response.Body:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorInfo'
      meta: {}
      success:
        type: boolean
    type: object
  response.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
      request_id:
        type: string
    type: object
info:
  contact: {}
  description: REST API service (Gin + GORM + SQL Server) — layered architecture
  title: go-api-service API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      summary: Login ด้วย phone_number + password
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Logout (เพิกถอน refresh ทั้งหมด)
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      summary: ขอ access token ใหม่ด้วย refresh cookie
      tags:
      - auth
  /api/v1/customers:
    get:
      parameters:
      - description: จำนวนสูงสุด (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: ข้ามกี่ record
        in: query
        name: offset
        type: integer
      - description: ค้นด้วยเบอร์โทร (unique)
        in: query
        name: phone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: List customers
      tags:
      - customers
  /api/v1/customers/{id}/profile:
    get:
      parameters:
      - description: customer id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: Get customer profile
      tags:
      - customers
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      summary: Liveness probe
      tags:
      - health
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/response.Body'
      summary: Readiness probe (ping DB)
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: ใส่ "Bearer <access_token>" (มี Bearer นำหน้า เว้นวรรค 1 ที)
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
